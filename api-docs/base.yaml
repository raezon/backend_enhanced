openapi: 3.0.3
info:
  title: ISO Voyage API docs
  version: 1.0.0-beta
  description: This is ISO Voyage APIs for the latest version 1.0.0

tags:
  - name: Auth
    description: Authentication related operations
  - name: Client
    description: Client related operations (protected routes)
  - name: User
    description: User related operations (protected routes)
  - name: Hotel
    description: Hotel related operations (protected routes)

paths:
  /api/public/auth/sign-in:
    post:
      tags:
        - Auth
      summary: Sign in user and return access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  example: securepassword123
      responses:
        '200':
          description: User signed in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User signed in successfully
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      username:
                        type: string
                      id:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                      phoneNumber:
                        type: string
                      userActive:
                        type: boolean
                      adminActive:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
        '400':
          description: Validation error (e.g., incorrect password)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Validation error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      details:
                        type: string
                        example: Password is incorrect
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user not found
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: USER_NOT_FOUND
                      details:
                        type: string
                        example: User does not exist
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

  /api/public/auth/refresh:
    get:
      tags:
        - Auth
      summary: Refresh the access token using the refresh token in cookies
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token refreshed successfully
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '403':
          description: Invalid token format
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Authentication failed
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      details:
                        type: string
                        example: Invalid token format
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Authentication failed
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      details:
                        type: string
                        example: User not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred
  /api/private/client/sign-out:
    get:
      tags:
        - Client
      summary: Sign out the currently logged-in user
      responses:
        '200':
          description: User signed out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User signed out successfully
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred
  /api/private/users:
    post:
      tags:
        - User
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - firstName
                - lastName
                - email
                - role
              properties:
                username:
                  type: string
                password:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                role:
                  type: string
                phoneNumber:
                  type: string
                address:
                  type: string
                  nullable: true
                agency:
                  type: string
                  nullable: true
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      password:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                      phoneNumber:
                        type: string
                      address:
                        type: string
                        nullable: true
                      userActive:
                        type: boolean
                      adminActive:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      agency:
                        type: string
                        nullable: true
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConstraintError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

    get:
      tags:
        - User
      summary: Get all users
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Users retrieved successfully
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        firstName:
                          type: string
                        lastName:
                          type: string
                        email:
                          type: string
                        role:
                          type: string
                        userActive:
                          type: boolean
                        adminActive:
                          type: boolean
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

  /api/private/users/{id}:
    get:
      tags:
        - User
      summary: Get a user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User retrieved successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      email:
                        type: string
                      phoneNumber:
                        type: string
                      role:
                        type: string
                      userActive:
                        type: boolean
                      adminActive:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User not found
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: USER_NOT_FOUND
                      details:
                        type: string
                        example: The user with the given ID does not exist
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

    delete:
      tags:
        - User
      summary: Delete a user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deleted successfully
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred
  /api/private/hotel:
    post:
      summary: Create a new hotel
      tags:
        - Hotel
      requestBody:
        required: true
        content:
          application/json:
            example:
              offerTitle: "Special Summer Offer"
              hotelName: "Grand Plaza"
              hotelAddress: "123 Main Street"
              phoneNumber: "+123456789"
              contactEmail: "info@grandplaza.com"
              hotelDescription: "Luxury stay in the heart of the city"
              hotelImageUrl: "https://example.com/image.jpg"
              stars: 5
              currency: "USD"
              price: 200
              discount: 15
              marketType: "Luxury"
              recommended: true
      responses:
        '201':
          description: Hotel created successfully
          content:
            application/json:
              example:
                message: "Hotel created successfully"
                data:
                  id: "abc123"
                  offerTitle: "Special Summer Offer"
                  hotelName: "Grand Plaza"
                  hotelAddress: "123 Main Street"
                  phoneNumber: "+123456789"
                  contactEmail: "info@grandplaza.com"
                  hotelDescription: "Luxury stay in the heart of the city"
                  hotelImageUrl: "https://example.com/image.jpg"
                  stars: 5
                  currency: "USD"
                  price: 200
                  discount: 15
                  marketType: "Luxury"
                  recommended: true
                  createdAt: "2025-05-22T10:00:00.000Z"
                  updatedAt: "2025-05-22T10:00:00.000Z"
        '400':
          description: Bad request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

    get:
      summary: Get all hotels
      tags:
        - Hotel
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Hotels retrieved successfully
          content:
            application/json:
              example:
                message: "Hotels retrieved successfully"
                data:
                  hotels:
                    - id: "h1"
                      hotelName: "Hotel One"
                      hotelAddress: "Address 1"
                      hotelImageUrl: "https://example.com/img1.jpg"
                      price: 120
                      discount: 10
                      recommended: true
                    - id: "h2"
                      hotelName: "Hotel Two"
                      hotelAddress: "Address 2"
                      hotelImageUrl: "https://example.com/img2.jpg"
                      price: 90
                      discount: null
                      recommended: false
        '400':
          description: Bad request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

  /api/private/hotel/{id}:
    get:
      summary: Get hotel by ID
      tags:
        - Hotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hotel retrieved successfully
          content:
            application/json:
              example:
                message: "Hotel retrieved successfully"
                data:
                  id: "abc123"
                  offerTitle: "Spring Discount"
                  hotelName: "Hotel Paradise"
                  hotelAddress: "123 Ocean View"
                  phoneNumber: "+1234567890"
                  contactEmail: "contact@hotelparadise.com"
                  hotelDescription: "A luxurious hotel by the sea."
                  hotelImageUrl: "https://example.com/image.jpg"
                  stars: 5
                  currency: "USD"
                  price: 250
                  discount: 15
                  marketType: "Luxury"
                  recommended: true
                  createdAt: "2025-05-22T10:00:00.000Z"
                  updatedAt: "2025-05-22T10:00:00.000Z"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user not found
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: USER_NOT_FOUND
                      details:
                        type: string
                        example: User does not exist
        '400':
          description: Bad request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

    put:
      summary: Update hotel by ID
      tags:
        - Hotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              offerTitle: "Updated Title"
              hotelName: "Updated Hotel Name"
              hotelAddress: "456 Updated Address"
              phoneNumber: "+1987654321"
              contactEmail: "new-contact@hotel.com"
              hotelDescription: "New description for the hotel."
              hotelImageUrl: "https://example.com/new-image.jpg"
              stars: 4
              currency: "EUR"
              price: 180
              discount: 10
              marketType: "Boutique"
              recommended: false
      responses:
        '200':
          description: Hotel updated successfully
          content:
            application/json:
              example:
                message: "Hotel updated successfully"
                data:
                  id: "abc123"
                  offerTitle: "Updated Title"
                  hotelName: "Updated Hotel Name"
                  hotelAddress: "456 Updated Address"
                  phoneNumber: "+1987654321"
                  contactEmail: "new-contact@hotel.com"
                  hotelDescription: "New description for the hotel."
                  hotelImageUrl: "https://example.com/new-image.jpg"
                  stars: 4
                  currency: "EUR"
                  price: 180
                  discount: 10
                  marketType: "Boutique"
                  recommended: false
                  createdAt: "2025-05-01T09:00:00.000Z"
                  updatedAt: "2025-05-22T10:45:00.000Z"
        '400':
          description: Bad request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred

    delete:
      summary: Delete hotel by ID
      tags:
        - Hotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hotel deleted successfully
          content:
            application/json:
              example:
                message: "Hotel deleted successfully"
        '400':
          description: Bad request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      details:
                        type: string
                        example: An unexpected error occurred
  /api/private/permission:
    post:
      summary: Create a new permission
      operationId: createPermission
      tags:
        - Permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resource
                - action
              properties:
                resource:
                  type: string
                  example: hotels
                  description: The resource name
                action:
                  type: string
                  example: read
                  description: The action type
      responses:
        '201':
          description: Permission created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Permission created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: abc123
                      resource:
                        type: string
                        example: hotels
                      action:
                        type: string
                        example: read
                      identifier:
                        type: string
                        example: hotels:read
                      createdAt:
                        type: string
                        format: date-time
                        example: 2025-05-24T10:00:00Z
                      updatedAt:
                        type: string
                        format: date-time
                        example: 2025-05-24T10:00:00Z

    get:
      summary: Get all permissions
      operationId: getAllPermissions
      tags:
        - Permission
      responses:
        '200':
          description: List of all permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: abc123
                    resource:
                      type: string
                      example: hotels
                    action:
                      type: string
                      example: read
  /api/private/role:
    post:
      summary: Create a new role
      operationId: createRole
      tags:
        - Role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - isDefault
                - permissionIds
              properties:
                name:
                  type: string
                  example: dashboard_admin
                isDefault:
                  type: boolean
                  example: false
                permissionIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  example:
                    - 123e4567-e89b-12d3-a456-426614174000
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Role created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: 001a2b3c-4d5e-6f70-8g9h-0ijk1l2m3n4o
                      name:
                        type: string
                        example: dashboard_admin
                      isDefault:
                        type: boolean
                        example: false
                      createdAt:
                        type: string
                        format: date-time
                        example: 2025-05-24T12:00:00Z
                      updatedAt:
                        type: string
                        format: date-time
                        example: 2025-05-24T12:00:00Z
                      deletedAt:
                        type: string
                        format: date-time
                        nullable: true
                        example: null

    get:
      summary: Get all roles
      operationId: getAllRoles
      tags:
        - Role
      responses:
        '200':
          description: List of all roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Roles fetched successfully
                  data:
                    type: array
                    items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: 001a2b3c-4d5e-6f70-8g9h-0ijk1l2m3n4o
                          name:
                            type: string
                            example: dashboard_admin
                          isDefault:
                            type: boolean
                            example: false
                          createdAt:
                            type: string
                            format: date-time
                            example: 2025-05-24T12:00:00Z
                          deletedAt:
                            type: string
                            format: date-time
                            example: null

  /api/private/visa:
    post:
      summary: Create a new visa
      tags:
        - Visa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                countryId:
                  type: string
                price:
                  type: number
                currency:
                  type: string
                description:
                  type: string
                conditions:
                  type: string
                status:
                  type: boolean
                duration:
                  type: string
              required:
                - name
                - countryId
                - price
                - currency
                - description
                - conditions
                - status
                - duration
      responses:
        '201':
          description: Visa created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      countryId:
                        type: string
                      price:
                        type: number
                      currency:
                        type: string
                      description:
                        type: string
                      conditions:
                        type: string
                      status:
                        type: boolean
                      duration:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      deletedAt:
                        type: string
                        format: date-time
                        nullable: true
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      details:
                        type: string

    get:
      summary: Get all visas
      tags:
        - Visa
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: countryId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Visas retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        countryId:
                          type: string
                        price:
                          type: number
                        currency:
                          type: string
                        description:
                          type: string
                        conditions:
                          type: string
                        status:
                          type: boolean
                        duration:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                        deletedAt:
                          type: string
                          format: date-time
                          nullable: true
        '500':
          description: Internal Server Error
          content:
            application/json:
