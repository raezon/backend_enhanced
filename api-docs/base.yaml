openapi: 3.0.3
info:
    title: User API
    version: 1.0.0
tags:
    - name: auth
      description: Auth-related operations
    - name: user
      description: User-related operations

paths:
    /api/user/public/sign-in:
        post:
            tags: [auth]
            summary: Sign in a user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username, password]
                            properties:
                                username:
                                    type: string
                                password:
                                    type: string
            responses:
                200:
                    description: User signed in successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    data:
                                        type: object
                                        properties:
                                            accessToken:
                                                type: string
                400:
                    $ref: "#/components/responses/ValidationError"
                404:
                    $ref: "#/components/responses/UserNotFound"
                500:
                    $ref: "#/components/responses/InternalServerError"

    /api/user/public/refresh:
        get:
            tags: [auth]
            summary: Refresh user access token
            responses:
                201:
                    description: Token refreshed successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    data:
                                        type: object
                                        properties:
                                            accessToken:
                                                type: string
                401:
                    $ref: "#/components/responses/AuthFailed"
                403:
                    $ref: "#/components/responses/AuthFailed"
                404:
                    $ref: "#/components/responses/UserNotFound"
                500:
                    $ref: "#/components/responses/InternalServerError"

    /api/user/private:
        get:
            tags: [user]
            summary: Get all users
            parameters:
                - name: page
                  in: query
                  schema:
                      type: integer
                - name: limit
                  in: query
                  schema:
                      type: integer
            responses:
                200:
                    description: Users retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    data:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/User"
                401:
                    $ref: "#/components/responses/AuthError"
                500:
                    $ref: "#/components/responses/InternalServerError"

        post:
            tags: [user]
            summary: Create a new user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                [
                                    firstName,
                                    lastName,
                                    username,
                                    email,
                                    password,
                                    phoneNumber,
                                    address,
                                    userActive,
                                    adminActive,
                                    agency,
                                ]
                            properties:
                                firstName:
                                    type: string
                                lastName:
                                    type: string
                                username:
                                    type: string
                                email:
                                    type: string
                                password:
                                    type: string
                                phoneNumber:
                                    type: string
                                address:
                                    type: string
                                userActive:
                                    type: boolean
                                adminActive:
                                    type: boolean
                                agency:
                                    type: string
            responses:
                201:
                    description: User created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    data:
                                        type: object
                                        properties:
                                            user:
                                                $ref: "#/components/schemas/User"
                400:
                    $ref: "#/components/responses/ValidationError"
                404:
                    $ref: "#/components/responses/ResourceNotFound"
                500:
                    $ref: "#/components/responses/InternalServerError"

    /api/user/private/{id}:
        get:
            tags: [user]
            summary: Get user by ID
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                200:
                    description: User retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    data:
                                        type: object
                                        properties:
                                            user:
                                                $ref: "#/components/schemas/User"
                400:
                    $ref: "#/components/responses/ValidationError"
                404:
                    $ref: "#/components/responses/ResourceNotFound"
                401:
                    $ref: "#/components/responses/AuthError"
                500:
                    $ref: "#/components/responses/InternalServerError"

        delete:
            tags: [user]
            summary: Delete user by ID
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                200:
                    description: User deleted successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                400:
                    $ref: "#/components/responses/ValidationError"
                404:
                    $ref: "#/components/responses/ResourceNotFound"
                401:
                    $ref: "#/components/responses/AuthError"
                500:
                    $ref: "#/components/responses/InternalServerError"

    /api/user/private/sign-out:
        get:
            tags: [auth]
            summary: Sign out the current user
            responses:
                200:
                    description: User signed out successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                401:
                    $ref: "#/components/responses/AuthError"
                500:
                    $ref: "#/components/responses/InternalServerError"

components:
    schemas:
        User:
            type: object
            properties:
                id:
                    type: string
                firstName:
                    type: string
                lastName:
                    type: string
                username:
                    type: string
                email:
                    type: string
                role:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                userActive:
                    type: boolean
                adminActive:
                    type: boolean
                phoneNumber:
                    type: string

    responses:
        ValidationError:
            description: Invalid input or missing fields
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                            error:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    details:
                                        type: string
        ResourceNotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                            error:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    details:
                                        type: string
        AuthFailed:
            description: Authentication failed
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                            error:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    details:
                                        type: string
        AuthError:
            description: Authorization required or invalid
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                            error:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    details:
                                        type: string
        InternalServerError:
            description: Unexpected server error
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                            error:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    details:
                                        type: string
        UserNotFound:
            description: User not found
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                            error:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    details:
                                        type: string
