version: '3.8'

services:
  app:
    build: .
    container_name: express_app
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eaUQjnKPtQFlSfhPKdwyvhILMIxKchqo
      POSTGRES_DB: railway
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - '6379:6379'
    command: redis-server --requirepass fQaModAenXCZUhMjCFINoSxueWAbKdFT

volumes:
  postgres_data:
